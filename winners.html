<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winners – Bet with Daniel Boulud</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #f7f5f0;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .page-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8e3da;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .page-title em { font-style: italic; color: #b08d3e; }

    .nav-link {
      font-size: 13px;
      color: #b08d3e;
      text-decoration: none;
      border: 1px solid #e8d9b0;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .nav-link:hover { background: #fdf9f1; }

    #loginScreen {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      max-width: 400px;
      margin: 60px auto;
    }

    #loginScreen h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    #loginScreen p { font-size: 14px; color: #888; margin-bottom: 24px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field input {
      padding: 10px 13px;
      border: 1px solid #e8e3da;
      border-radius: 9px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field input:focus { border-color: #b08d3e; }

    .btn {
      padding: 13px 20px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-primary { background: #1a1a1a; color: #fff; width: 100%; }
    .btn-primary:hover { background: #2e2e2e; }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .match-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .match-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .match-result {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: #b08d3e;
      white-space: nowrap;
      margin-left: 12px;
    }

    .match-meta { font-size: 12px; color: #aaa; margin-top: 4px; }

    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-active { background: #fdf9f1; color: #b08d3e; border: 1px solid #e8d9b0; }
    .badge-done   { background: #f0faf0; color: #166534; border: 1px solid #bbf7d0; }
    .badge-pending { background: #f5f5f5; color: #888; border: 1px solid #e0e0e0; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      font-weight: 500;
      border-bottom: 1px solid #f0ede6;
    }

    td { padding: 10px 12px; border-bottom: 1px solid #f7f5f0; color: #333; }
    tr:last-child td { border-bottom: none; }

    .winner-pick {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: #b08d3e;
    }

    .empty-state {
      text-align: center;
      padding: 24px 0 8px;
      font-size: 13px;
      color: #aaa;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 48px 0;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
<div class="container">

  <div id="loginScreen">
    <h2>Admin access</h2>
    <p>Enter the password to view winners</p>
    <div class="field" style="margin-bottom:14px;">
      <input type="password" id="pwInput" placeholder="Password" />
    </div>
    <button class="btn btn-primary" onclick="checkPassword()">Sign in</button>
    <div class="error-msg" id="loginError">Incorrect password</div>
  </div>

  <div id="mainContent" style="display:none;">

    <div class="page-header">
      <div class="page-title">Winners &nbsp;<em>board</em></div>
      <a href="/admin" class="nav-link">← Admin</a>
    </div>

    <div id="loadingState" class="loading">Loading matches…</div>
    <div id="matchCards"></div>

  </div>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ADMIN_PASSWORD = 'dinex2026';

  function checkPassword() {
    alert('clicked');
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      loadWinners();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  async function loadWinners() {
    const { data: matches, error } = await client
      .from('matches')
      .select('*')
      .order('match_date', { ascending: false });

    document.getElementById('loadingState').style.display = 'none';

    if (error || !matches || matches.length === 0) {
      document.getElementById('matchCards').innerHTML =
        '<div class="card"><div class="empty-state">No matches found.</div></div>';
      return;
    }

    const container = document.getElementById('matchCards');

    for (const match of matches) {
      const { data: predictions } = await client
        .from('predictions')
        .select('*')
        .eq('match_id', match.id);

      container.appendChild(buildMatchCard(match, predictions || []));
    }
  }

  function buildMatchCard(match, predictions) {
    const winners = predictions.filter(p => p.is_winner);

    let badgeHtml = '';
    if (match.is_active) badgeHtml = '<span class="badge badge-active">Active</span>';
    else if (match.is_finished) badgeHtml = '<span class="badge badge-done">Finished</span>';
    else badgeHtml = '<span class="badge badge-pending">Pending</span>';

    const resultHtml = (match.actual_score_home !== null && match.actual_score_away !== null)
      ? `<div class="match-result">${match.actual_score_home} – ${match.actual_score_away}</div>`
      : '';

    const dateStr = match.match_date
      ? new Date(match.match_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : '';

    const metaParts = [dateStr, match.stage, match.venue].filter(Boolean);

    let tableHtml = '';
    if (winners.length > 0) {
      const rows = winners.map(w => `
        <tr>
          <td>${esc(w.name || '—')}</td>
          <td>${esc(w.email || '—')}</td>
          <td>${esc(w.restaurant || '—')}</td>
          <td class="winner-pick">${w.score_home} – ${w.score_away}</td>
        </tr>`).join('');

      tableHtml = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Restaurant</th>
              <th>Pick</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else {
      tableHtml = `<div class="empty-state">No winners yet</div>`;
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="match-header">
        <div>
          <div class="match-name">${esc(match.flag_home || '')} ${esc(match.team_home)} vs ${esc(match.team_away)} ${esc(match.flag_away || '')}</div>
          <div class="match-meta">${esc(metaParts.join(' · '))}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
          ${resultHtml}
          ${badgeHtml}
        </div>
      </div>
      ${tableHtml}`;

    return card;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
